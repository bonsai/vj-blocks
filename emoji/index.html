<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🙂 EMOJI VJ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
canvas{display:block;width:100%;height:100%;image-rendering:pixelated;touch-action:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
let W,H,COLS,ROWS,BLOCK;
let grid=[],hue=0,hueSpeed=.5,mode=0,paused=false,frame=0;
const EMOJIS=[{c:'🎵',n:'Notes'},{c:'✨',n:'Sparkle'},{c:'🌟',n:'Star'},{c:'💫',n:'Dizzy'},{c:'🌈',n:'Rainbow'},{c:'🔥',n:'Fire'},{c:'🎨',n:'Palette'}];

function resize(){
  W=c.width=innerWidth;H=c.height=innerHeight;
  BLOCK=Math.max(8,Math.min(32,Math.round(Math.min(W,H)/48)));
  COLS=Math.ceil(W/BLOCK);ROWS=Math.ceil(H/BLOCK);
  grid=Array.from({length:ROWS},()=>Array(COLS).fill(0));
}
resize();addEventListener('resize',resize);

function updateGrid(){
  const t=frame*.02;
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const nx=c/COLS,ny=r/ROWS;
    const pulse=.6+.4*Math.sin(t*.5+r*.3+c*.2);
    grid[r][c]=((nx+ny+t*.05)*.3+pulse*.2+.3)%1;
  }
}

function draw(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  const t=frame*.01;
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const h=(grid[r][c]*360+hue)%360,s=100;
    let l=50+15*Math.sin(grid[r][c]*Math.PI*2+t);
    l=Math.min(92,l);
    const ei=mode,{c:emoji}=EMOJIS[ei];
    ctx.fillStyle=`hsl(${h|0},${s}%,${(l*.3+15)|0}%)`;
    const bx=c*BLOCK,by=r*BLOCK;
    ctx.fillRect(bx,by,BLOCK,BLOCK);
    const ph=c*.7+r*.5+t*.8;
    let bobX=0,bobY=0,sz=BLOCK*.55;
    switch(ei){
      case 0:bobY=Math.sin(ph*1.3)*BLOCK*.18;sz=BLOCK*(.5+.15*Math.sin(ph*.7));break;
      case 1:sz=BLOCK*(.3+.35*Math.sin(ph*1.1+Math.sin(t*.3)));break;
      case 2:bobX=Math.sin(ph*.9)*BLOCK*.2;bobY=Math.cos(ph*.9)*BLOCK*.15;break;
      case 3:bobX=Math.sin(ph*2.1+t*.5)*BLOCK*.12;bobY=Math.cos(ph*2.1+t*.5)*BLOCK*.12;sz=BLOCK*(.45+.15*Math.sin(ph*2.5));break;
      case 4:bobX=Math.sin(ph*.5+t*.2)*BLOCK*.25;sz=BLOCK*(.5+.1*Math.sin(ph*.6));break;
      case 5:bobY=-Math.abs(Math.sin(ph*.7+t*.4))*BLOCK*.2;sz=BLOCK*(.4+.25*Math.sin(ph*1.7+t*.5));break;
      case 6:bobX=Math.sin(Math.sin(ph*3.1)*7+t)*BLOCK*.08;bobY=Math.cos(ph*4.3+t*.3)*BLOCK*.08;break;
    }
    ctx.font=`${Math.max(8,sz|0)}px sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(emoji,bx+BLOCK/2+bobX|0,by+BLOCK/2+bobY|0);
  }
  ctx.strokeStyle=`hsla(${(hue+t*60)%360},100%,60%,.15)`;
  ctx.lineWidth=4;ctx.strokeRect(2,2,W-4,H-4);
}

function loop(){
  if(!paused){hue=(hue+hueSpeed)%360;updateGrid();draw();frame++}
  requestAnimationFrame(loop);
}

document.addEventListener('keydown',e=>{
  const k=e.key;
  if(k>='1'&&k<='7'){mode=parseInt(k)-1;return}
  switch(k){
    case 'ArrowLeft':mode=(mode-1+7)%7;return;
    case 'ArrowRight':mode=(mode+1)%7;return;
    case ' ':e.preventDefault();paused=!paused;return;
    case 'f':case 'F':c.requestFullscreen();return;
    case '+':case '=':hueSpeed=Math.min(3,hueSpeed+.1);return;
    case '-':case '_':hueSpeed=Math.max(0,hueSpeed-.1);return;
  }
});
loop();
</script>
</body>
</html>
