<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 FIRE VJ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
canvas{display:block;width:100%;height:100%;image-rendering:pixelated;touch-action:none}
#mic{position:fixed;top:16px;right:16px;font:12px/1 monospace;color:rgba(255,255,255,.4);pointer-events:none}
#mic.on{color:#f60;text-shadow:0 0 8px #f60}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="mic">🎤 <span id="micStatus">OFF</span></div>
<script>
const c = document.getElementById('c'), ctx = c.getContext('2d');
let W, H, COLS, ROWS, BLOCK;
let grid = [];
let hue = 0, hueSpeed = 0.5;
let paused = false;
let frame = 0;

// ---- audio ----
let audioCtx, analyser, micStream, micOn = false;
let freqData, timeData;
const audio = { volume:0, bass:0, mid:0, treble:0, beat:false };
let beatHistory = [];

async function toggleMic() {
  if (micOn) {
    if (micStream) micStream.getTracks().forEach(t=>t.stop());
    micOn = false;
    document.getElementById('mic').classList.remove('on');
    document.getElementById('micStatus').textContent = 'OFF';
    return;
  }
  try {
    micStream = await navigator.mediaDevices.getUserMedia({audio:true});
    audioCtx = new AudioContext();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    audioCtx.createMediaStreamSource(micStream).connect(analyser);
    freqData = new Uint8Array(analyser.frequencyBinCount);
    timeData = new Uint8Array(analyser.frequencyBinCount);
    micOn = true;
    document.getElementById('mic').classList.add('on');
    document.getElementById('micStatus').textContent = 'ON';
  } catch(e) { console.warn(e); }
}

function analyze() {
  if (!analyser) return;
  analyser.getByteTimeDomainData(timeData);
  let sum = 0;
  for (let i = 0; i < timeData.length; i++) {
    const n = (timeData[i] - 128)/128;
    sum += n*n;
  }
  audio.volume = Math.min(1, Math.sqrt(sum/timeData.length)*2);
  analyser.getByteFrequencyData(freqData);
  const len = freqData.length;
  audio.bass = 0; audio.mid = 0; audio.treble = 0;
  for (let i = 0; i < len; i++) {
    const v = freqData[i]/255;
    if (i < 6) audio.bass += v;
    else if (i < 41) audio.mid += v;
    else audio.treble += v;
  }
  audio.bass /= Math.min(6,len);
  audio.mid /= Math.min(35,len-6);
  audio.treble /= Math.max(1, len-41);
  beatHistory.push(audio.bass);
  if (beatHistory.length > 43) beatHistory.shift();
  const avg = beatHistory.reduce((a,b)=>a+b,0)/beatHistory.length;
  audio.beat = audio.bass > avg*1.35 && audio.bass > 0.15;
}

// ---- resize ----
function resize() {
  W = c.width = innerWidth;
  H = c.height = innerHeight;
  BLOCK = Math.max(8, Math.min(32, Math.round(Math.min(W,H)/48)));
  COLS = Math.ceil(W/BLOCK); ROWS = Math.ceil(H/BLOCK);
  grid = Array.from({length:ROWS},()=>Array(COLS).fill(0));
}
resize();
addEventListener('resize', resize);

// ---- fire ----
function updateGrid() {
  const t = frame * 0.02;
  const vol = audio.volume, treb = audio.treble;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const nx = c/COLS, ny = r/ROWS;
      const seed = nx*37 + ny*71 + t*5 + treb*10;
      const n = Math.sin(seed)*0.5 + Math.sin(seed*3.1)*0.3 + Math.sin(seed*7.7)*0.2;
      grid[r][c] = ((n*0.5+0.5)*(0.5+vol*0.5) + t*0.01) % 1;
    }
  }
}

function draw() {
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);
  const t = frame*0.01, vol=audio.volume, bass=audio.bass, beat=audio.beat?1:0;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const h = (grid[r][c]*360 + hue + bass*30) % 360;
      let l = 50 + 15*Math.sin(grid[r][c]*Math.PI*2 + t) + vol*10;
      if (beat) l = Math.min(98, l*1.2);
      l = Math.min(92, l);
      const pulse = 1 + vol*0.15 + (beat?0.2:0);
      const bw = BLOCK*pulse, bh = BLOCK*pulse;
      const bx = c*BLOCK+(BLOCK-bw)/2, by = r*BLOCK+(BLOCK-bh)/2;
      ctx.fillStyle = `hsl(${h|0},100%,${l|0}%)`;
      ctx.fillRect(bx|0,by|0,bw|0,bh|0);
      ctx.fillStyle = `hsla(${h|0},100%,${Math.min(l+15,95)|0}%,0.3)`;
      ctx.fillRect(bx|0,by|0,bw|0,2); ctx.fillRect(bx|0,by|0,2,bh|0);
      ctx.fillStyle = `hsla(${h|0},100%,${Math.max(l-25,5)|0}%,0.4)`;
      ctx.fillRect(bx|0,(by+bh-2)|0,bw|0,2); ctx.fillRect((bx+bw-2)|0,by|0,2,bh|0);
    }
  }
  // border
  ctx.strokeStyle = `hsla(${(hue + t*60 + bass*90)%360},100%,60%,${beat?0.6:0.2})`;
  ctx.lineWidth = beat?6:4;
  ctx.strokeRect(2,2,W-4,H-4);
}

// ---- loop ----
function loop() {
  if (!paused) {
    analyze();
    hue = (hue + hueSpeed + audio.mid*0.5) % 360;
    updateGrid(); draw(); frame++;
  }
  requestAnimationFrame(loop);
}

// ---- keys ----
document.addEventListener('keydown', e => {
  switch(e.key) {
    case ' ': e.preventDefault(); paused=!paused; return;
    case 'm': case 'M': toggleMic(); return;
    case 'r': case 'R': hue=0; frame=0; return;
    case 'f': case 'F': c.requestFullscreen(); return;
    case '+': case '=': hueSpeed=Math.min(3,hueSpeed+0.1); return;
    case '-': case '_': hueSpeed=Math.max(0,hueSpeed-0.1); return;
  }
});
c.addEventListener('dblclick', () => c.requestFullscreen());
loop();
</script>
</body>
</html>
