<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VJ BLOCKS 🌈</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
canvas{display:block;width:100%;height:100%;image-rendering:pixelated;cursor:none}
#info{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  font:12px/1 monospace;color:rgba(255,255,255,.3);pointer-events:none;
  text-align:center;letter-spacing:1px}
#mic{position:fixed;top:16px;right:16px;font:12px/1 monospace;
  color:rgba(255,255,255,.4);pointer-events:none;text-align:right;
  transition:color .15s}
#mic.on{color:#0f0;text-shadow:0 0 8px #0f0}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="info">[ 1‥7:mode │ SPACE:pause │ R:reset │ F:fullscreen │ M:mic │ C:auto │ +/-:speed │ mouse:drag ]</div>
<div id="mic">🎤 <span id="micStatus">OFF</span></div>
<script>
const c = document.getElementById('c'), ctx = c.getContext('2d');
const micEl = document.getElementById('mic');
const micStatus = document.getElementById('micStatus');

let W, H, COLS, ROWS, BLOCK;

// ---- state ----
let grid = [];
let hue = 0, hueSpeed = 0.5;
let mode = 0;
let paused = false;
let mouse = {x: -1, y: -1, down: false};
let frame = 0;
let autoCycle = false;
let cycleTimer = 0;

// ---- beat flash state ----
let beatFlash = 0; // decays from 1→0
let beatSparks = [];

// ---- audio state ----
let audioCtx = null;
let analyser = null;
let micStream = null;
let micOn = false;
let freqData = null;
let timeData = null;
let audio = {
  volume: 0,     // RMS (0-1)
  bass: 0,       // 20-250Hz
  mid: 0,        // 250-2kHz
  treble: 0,     // 2-20kHz
  spectrum: [],  // full frequency data
  beat: false,
  beatEnergy: 0
};
let beatHistory = [];
const FFT_SIZE = 512; // higher res for visualizer
let audioViz = { bars: [], peaks: [] };

// ---- resize ----
function resize() {
  W = c.width = window.innerWidth;
  H = c.height = window.innerHeight;
  BLOCK = Math.max(8, Math.min(32, Math.round(Math.min(W,H) / 48)));
  COLS = Math.ceil(W / BLOCK);
  ROWS = Math.ceil(H / BLOCK);
  grid = Array.from({length: ROWS}, () => Array(COLS).fill(0));
}
resize();
window.addEventListener('resize', resize);

// ---- audio engine ----
async function initMic() {
  try {
    micStream = await navigator.mediaDevices.getUserMedia({audio: true});
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = FFT_SIZE;
    const src = audioCtx.createMediaStreamSource(micStream);
    src.connect(analyser);
    freqData = new Uint8Array(analyser.frequencyBinCount);
    timeData = new Uint8Array(analyser.frequencyBinCount);
    micOn = true;
    micEl.classList.add('on');
    micStatus.textContent = 'ON';
    return true;
  } catch(e) {
    console.warn('Mic access denied:', e);
    micOn = false;
    micEl.classList.remove('on');
    micStatus.textContent = 'DENIED';
    return false;
  }
}

function closeMic() {
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  analyser = null;
  micOn = false;
  micEl.classList.remove('on');
  micStatus.textContent = 'OFF';
}

function toggleMic() {
  if (micOn) { closeMic(); }
  else { initMic(); }
}

function analyzeAudio() {
  if (!analyser || !micOn) return;

  // time-domain (RMS volume)
  analyser.getByteTimeDomainData(timeData);
  let sumSq = 0;
  for (let i = 0; i < timeData.length; i++) {
    const norm = (timeData[i] - 128) / 128;
    sumSq += norm * norm;
  }
  audio.volume = Math.min(1, Math.sqrt(sumSq / timeData.length) * 2);

  // frequency-domain
  analyser.getByteFrequencyData(freqData);
  const nyquist = audioCtx ? audioCtx.sampleRate / 2 : 24000;
  const binHz = nyquist / freqData.length;

  // bass: bins 0-5 (~0-250Hz), mid: 6-40 (~250-2kHz), treble: 41+ (~2kHz+)
  let bassSum = 0, midSum = 0, trebleSum = 0;
  const bassEnd = Math.min(6, freqData.length);
  const midEnd = Math.min(41, freqData.length);
  for (let i = 0; i < freqData.length; i++) {
    const v = freqData[i] / 255;
    if (i < bassEnd) bassSum += v;
    else if (i < midEnd) midSum += v;
    else trebleSum += v;
  }
  const bassN = bassEnd;
  const midN = midEnd - bassEnd;
  const trebleN = freqData.length - midEnd;
  audio.bass = bassN > 0 ? bassSum / bassN : 0;
  audio.mid = midN > 0 ? midSum / midN : 0;
  audio.treble = trebleN > 0 ? trebleSum / trebleN : 0;

  // simple beat detection on bass
  const prevBeat = audio.beat;
  beatHistory.push(audio.bass);
  if (beatHistory.length > 43) beatHistory.shift();
  const avg = beatHistory.reduce((a,b) => a+b, 0) / beatHistory.length;
  audio.beat = audio.bass > avg * 1.35 && audio.bass > 0.15;
  audio.beatEnergy = audio.beat ? audio.bass : 0;

  // beat flash & sparks
  if (audio.beat && !prevBeat) {
    beatFlash = 1;
    for (let i = 0; i < 8; i++) {
      beatSparks.push({
        x: Math.random(),
        y: Math.random(),
        vx: (Math.random() - 0.5) * 0.02,
        vy: -Math.random() * 0.02 - 0.005,
        life: 1,
        decay: 0.015 + Math.random() * 0.02,
        hue: (hue + Math.random() * 120) % 360,
        size: 2 + Math.random() * 4
      });
    }
  }
}

// ---- block renderers per mode ----
function updateGrid() {
  const t = frame * 0.02;
  const mX = mouse.down ? mouse.x / W : 0.5;
  const mY = mouse.down ? mouse.y / H : 0.5;

  // audio modulation
  const vol = audio.volume;
  const bass = audio.bass;
  const mid = audio.mid;
  const treb = audio.treble;
  const beat = audio.beat ? 1 : 0;

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const nx = c / COLS, ny = r / ROWS;
      let val = 0;

      switch (mode) {
        case 0: // rainbow flow — waves with audio
          val = (nx * (1 + bass * 0.5) + ny + t * (0.3 + mid * 0.3) + vol * 0.15) % 1;
          break;
        case 1: // static rainbow grid — pulsing with beat
          const beatPulse = beat ? 0.15 * Math.sin(t * 12) : 0;
          val = ((nx * (3 + treb * 2) + ny * 2 + beatPulse) % 1 + t * (0.05 + bass * 0.08)) % 1;
          break;
        case 2: { // wave — center follows volume
          const r2 = Math.sqrt((nx - 0.5)**2 + (ny - (0.5 + vol * 0.2))**2) * (6 + bass * 4);
          val = (Math.sin(r2 - t * (2 + vol * 3)) + 1) * 0.5;
          break; }
        case 3: { // spiral — arms spin with mid
          const dx = nx - mX, dy = ny - mY;
          const a = Math.atan2(dy, dx) / (Math.PI * 2);
          const d = Math.sqrt(dx*dx + dy*dy) * (5 + treb * 4);
          val = ((a + d - t * (0.5 + mid * 1.0)) % 1 + 1) % 1;
          break; }
        case 4: { // noise / glitch — triggered by beat
          const seed = (nx * 7.31 + ny * 13.17 + t * (1.7 + vol * 2.5));
          let n = Math.sin(seed) * 0.5 + Math.sin(seed * 1.7) * 0.25 + Math.sin(seed * 4.3) * 0.125;
          if (beat) {
            // jitter on beat
            const jx = Math.sin(seed * 17.3 + t * 30) * 0.2;
            const jy = Math.cos(seed * 23.7 + t * 30) * 0.2;
            val = ((nx + jx + ny + jy) * 0.5 + n * 0.5 + t * 0.05) % 1;
          } else {
            val = ((n * 0.5 + 0.5) + t * 0.02) % 1;
          }
          break; }
        case 5: { // tunnel — bass drives zoom
          const dx = nx - 0.5, dy = ny - 0.5;
          const d = Math.sqrt(dx*dx + dy*dy);
          const a = Math.atan2(dy, dx);
          const zoom = 0.5 + bass * 0.5;
          val = ((a / (Math.PI * 2) + t * (0.3 + mid * 0.3) - d * (2 + zoom * 3)) % 1 + 1) % 1;
          break; }
        case 6: { // fire — treble sparks
          const seed = nx * 37 + ny * 71 + t * 5 + treb * 10;
          const n = Math.sin(seed) * 0.5 + Math.sin(seed * 3.1) * 0.3 + Math.sin(seed * 7.7) * 0.2;
          val = ((n * 0.5 + 0.5) * (0.5 + vol * 0.5) + t * 0.01) % 1;
          break; }
      }

      // beat: grid shift per mode
      if (beat && mode < 5) {
        const shiftX = Math.sin(t * 30) * 0.1;
        const shiftY = Math.cos(t * 30) * 0.1;
        val = ((val + shiftX + shiftY) % 1 + 1) % 1;
      }

      grid[r][c] = val;
    }
  }
}

function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  const t = frame * 0.01;
  const vol = audio.volume;
  const bass = audio.bass;
  const beat = audio.beat ? 1 : 0;

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      // hue advances faster with bass
      const h = (grid[r][c] * 360 + hue + bass * 30) % 360;
      const s = 100;

      // brightness: base + volume modulation + beat
      let l = 50 + 15 * Math.sin(grid[r][c] * Math.PI * 2 + t);
      l += vol * 10;
      l = Math.min(92, l);

      // beat: extra glow
      if (beat) l = Math.min(98, l + 20);

      ctx.fillStyle = `hsl(${h|0},${s}%,${l|0}%)`;

      // block size pulses with volume
      const pulse = 1 + vol * 0.15 + (beat ? 0.2 : 0);
      const bw = BLOCK * pulse;
      const bh = BLOCK * pulse;
      const bx = c * BLOCK + (BLOCK - bw) / 2;
      const by = r * BLOCK + (BLOCK - bh) / 2;
      ctx.fillRect(bx|0, by|0, bw|0, bh|0);

      // highlight edge
      ctx.fillStyle = `hsla(${h|0},${s}%,${Math.min(l+15,95)|0}%,0.3)`;
      ctx.fillRect(bx|0, by|0, bw|0, 2);
      ctx.fillRect(bx|0, by|0, 2, bh|0);

      // shadow edge
      ctx.fillStyle = `hsla(${h|0},${s}%,${Math.max(l-25,5)|0}%,0.4)`;
      ctx.fillRect(bx|0, (by+bh-2)|0, bw|0, 2);
      ctx.fillRect((bx+bw-2)|0, by|0, 2, bh|0);
    }
  }

  // beat flash border
  const flash = beat ? 0.6 : 0.15 + 0.1 * Math.sin(t * 2);
  ctx.strokeStyle = `hsla(${(hue + t * 60 + bass * 90) % 360},100%,60%,${flash})`;
  ctx.lineWidth = beat ? 6 : 4;
  ctx.strokeRect(2, 2, W - 4, H - 4);

  // beat flash overlay
  if (beatFlash > 0.01) {
    ctx.fillStyle = `hsla(0,0%,100%,${beatFlash * 0.12})`;
    ctx.fillRect(0, 0, W, H);
    beatFlash *= 0.88;
  }

  // beat sparks (particles)
  for (let i = beatSparks.length - 1; i >= 0; i--) {
    const s = beatSparks[i];
    s.x += s.vx;
    s.y += s.vy;
    s.life -= s.decay;
    if (s.life <= 0) { beatSparks.splice(i, 1); continue; }
    ctx.fillStyle = `hsla(${s.hue|0},100%,70%,${s.life * 0.6})`;
    const sx = s.x * W, sy = s.y * H;
    const sz = s.size * s.life;
    ctx.fillRect(sx|0, sy|0, sz|0, sz|0);
  }

  // auto-cycle mode indicator
  if (autoCycle) {
    ctx.fillStyle = `hsla(${(hue + 180) % 360},100%,60%,${0.15 + 0.1 * Math.sin(t * 3)})`;
    ctx.font = '10px monospace';
    ctx.fillText('AUTO', 16, 30);
  }

  // spectrum visualizer overlay (subtle, bottom edge)
  if (micOn && freqData) {
    const barW = 3;
    const barGap = 1;
    const barH = 40;
    const barY = H - barH - 8;
    const nBars = Math.min(64, freqData.length);
    const totalW = nBars * (barW + barGap);
    const startX = (W - totalW) / 2;

    for (let i = 0; i < nBars; i++) {
      // average multiple bins per bar for visual smoothness
      let sum = 0;
      const binsPerBar = Math.max(1, Math.floor(freqData.length / nBars));
      for (let j = 0; j < binsPerBar; j++) {
        sum += freqData[i * binsPerBar + j] || 0;
      }
      const v = sum / (binsPerBar * 255);
      const barHeight = Math.max(1, v * barH);

      // rainbow by position
      const barHue = (hue + i * 5.6) % 360;
      ctx.fillStyle = `hsla(${barHue|0},100%,${50 + v * 40|0}%,0.35)`;
      ctx.fillRect(startX + i * (barW + barGap), barY + barH - barHeight, barW, barHeight);
    }

    // activity dB meter (top-right corner)
    const db = 20 * Math.log10(Math.max(0.001, audio.volume));
    const dbNorm = Math.min(1, (db + 40) / 40); // -40dB to 0dB scaled
    const meterW = 4;
    const meterH = 60;
    const meterX = W - 24;
    const meterY = 40;
    ctx.fillStyle = `hsla(${(1 - dbNorm) * 120},100%,50%,0.3)`;
    ctx.fillRect(meterX, meterY + meterH * (1 - dbNorm), meterW, meterH * dbNorm);
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.strokeRect(meterX, meterY, meterW, meterH);
  }
}

// ---- loop ----
function loop() {
  if (!paused) {
    analyzeAudio();
    updateAutoCycle();
    hue = (hue + hueSpeed + audio.mid * 0.5) % 360;
    updateGrid();
    draw();
    frame++;
  }
  requestAnimationFrame(loop);
}

// ---- auto-cycle ----
function updateAutoCycle() {
  if (!autoCycle || !micOn) return;
  cycleTimer++;
  // switch mode every ~4 seconds at 60fps
  if (cycleTimer > 60 * 4) {
    mode = (mode + 1) % 7;
    cycleTimer = 0;
  }
}

// ---- interact ----
document.addEventListener('keydown', e => {
  const k = e.key;
  if (k >= '1' && k <= '7') { mode = parseInt(k) - 1; return; }
  switch(k) {
    case ' ': e.preventDefault(); paused = !paused; return;
    case 'r': case 'R': hue = 0; frame = 0; audio.beat = false; return;
    case 'f': case 'F': c.requestFullscreen(); return;
    case 'm': case 'M': toggleMic(); return;
    case 'c': case 'C': autoCycle = !autoCycle; cycleTimer = 0; return;
    case '+': case '=': hueSpeed = Math.min(3, hueSpeed + 0.1); return;
    case '-': case '_': hueSpeed = Math.max(0, hueSpeed - 0.1); return;
  }
});

c.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
c.addEventListener('mousedown', () => mouse.down = true);
c.addEventListener('mouseup', () => mouse.down = false);
c.addEventListener('touchmove', e => {
  const t = e.touches[0];
  mouse.x = t.clientX; mouse.y = t.clientY; mouse.down = true;
});
c.addEventListener('touchend', () => mouse.down = false);
window.addEventListener('contextmenu', e => e.preventDefault());

// ---- go ----
loop();
</script>
</body>
</html>
