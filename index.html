<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VJ BLOCKS 🌈</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
canvas{display:block;width:100%;height:100%;image-rendering:pixelated;cursor:none}
#info{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  font:12px/1 monospace;color:rgba(255,255,255,.3);pointer-events:none;
  text-align:center;letter-spacing:1px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="info">[ 1-7:colors │ SPACE:pause │ R:reset │ F:fullscreen │ mouse:drag ]</div>
<script>
const c = document.getElementById('c'), ctx = c.getContext('2d');
let W, H, COLS, ROWS, BLOCK;

// ---- state ----
let grid = [];
let hue = 0, hueSpeed = 0.5;
let mode = 0; // 0=rainbow-flow, 1=rainbow-static, 2=wave, 3=spiral, 4=noise
let paused = false;
let mouse = {x: -1, y: -1, down: false};
let frame = 0;

// ---- resize ----
function resize() {
  W = c.width = window.innerWidth;
  H = c.height = window.innerHeight;
  BLOCK = Math.max(8, Math.min(32, Math.round(Math.min(W,H) / 48)));
  COLS = Math.ceil(W / BLOCK);
  ROWS = Math.ceil(H / BLOCK);
  grid = Array.from({length: ROWS}, () => Array(COLS).fill(0));
}
resize();
window.addEventListener('resize', resize);

// ---- helpers ----
function hsl(h, s=100, l=55) { return `hsl(${h|0},${s}%,${l}%)`; }

function rainbow(t) {
  const h = (t * 360) % 360;
  return [h, 100, 55 + 15 * Math.sin(t * Math.PI * 2)];
}

// ---- block renderers per mode ----
function updateGrid() {
  const t = frame * 0.02;
  const mX = mouse.down ? mouse.x / W : 0.5;
  const mY = mouse.down ? mouse.y / H : 0.5;

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const nx = c / COLS, ny = r / ROWS;
      let val = 0;

      switch (mode) {
        case 0: // rainbow flow — smooth gradient bands
          val = (nx + ny + t * 0.3) % 1;
          break;
        case 1: // static rainbow grid
          val = ((nx * 3 + ny * 2) % 1 + t * 0.05) % 1;
          break;
        case 2: { // wave interference
          const d = Math.sqrt((nx - 0.5)**2 + (ny - mY)**2) * 6;
          val = (Math.sin(d - t * 2) + 1) * 0.5;
          break; }
        case 3: { // spiral
          const dx = nx - mX, dy = ny - mY;
          const a = Math.atan2(dy, dx) / (Math.PI * 2);
          const d = Math.sqrt(dx*dx + dy*dy) * 5;
          val = ((a + d - t * 0.5) % 1 + 1) % 1;
          break; }
        case 4: { // noise / glitch
          const seed = (nx * 7.31 + ny * 13.17 + t * 1.7);
          const n = Math.sin(seed) * 0.5 + Math.sin(seed * 1.7) * 0.25 + Math.sin(seed * 4.3) * 0.125;
          val = ((n * 0.5 + 0.5) + t * 0.02) % 1;
          break; }
      }

      grid[r][c] = val;
    }
  }
}

function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  const t = frame * 0.01;

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const h = (grid[r][c] * 360 + hue) % 360;
      const s = 100;
      const l = 50 + 15 * Math.sin(grid[r][c] * Math.PI * 2 + t);

      ctx.fillStyle = `hsl(${h|0},${s}%,${l}%)`;

      // retro 3D block effect (top-left highlight)
      ctx.fillRect(c * BLOCK, r * BLOCK, BLOCK, BLOCK);

      // subtle inner bright edge (retro CRT feel)
      ctx.fillStyle = `hsla(${h|0},${s}%,${Math.min(l+20,95)|0}%,0.3)`;
      ctx.fillRect(c * BLOCK, r * BLOCK, BLOCK, 2);
      ctx.fillRect(c * BLOCK, r * BLOCK, 2, BLOCK);

      // dark shadow (bottom-right)
      ctx.fillStyle = `hsla(${h|0},${s}%,${Math.max(l-30,5)|0}%,0.4)`;
      ctx.fillRect(c * BLOCK, r * BLOCK + BLOCK - 2, BLOCK, 2);
      ctx.fillRect(c * BLOCK + BLOCK - 2, r * BLOCK, 2, BLOCK);
    }
  }

  // pulse frame border
  ctx.strokeStyle = `hsla(${(hue + t * 60) % 360},100%,60%,${0.2 + 0.15 * Math.sin(t * 2)})`;
  ctx.lineWidth = 4;
  ctx.strokeRect(2, 2, W - 4, H - 4);
}

// ---- loop ----
function loop() {
  if (!paused) {
    hue = (hue + hueSpeed) % 360;
    updateGrid();
    draw();
    frame++;
  }
  requestAnimationFrame(loop);
}

// ---- interact ----
document.addEventListener('keydown', e => {
  const k = e.key;
  if (k >= '1' && k <= '7') { mode = parseInt(k) - 1; return; }
  switch(k) {
    case ' ': e.preventDefault(); paused = !paused; return;
    case 'r': case 'R': hue = 0; frame = 0; return;
    case 'f': case 'F': c.requestFullscreen(); return;
  }
});

c.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
c.addEventListener('mousedown', () => mouse.down = true);
c.addEventListener('mouseup', () => mouse.down = false);
c.addEventListener('touchmove', e => {
  const t = e.touches[0];
  mouse.x = t.clientX; mouse.y = t.clientY; mouse.down = true;
});
c.addEventListener('touchend', () => mouse.down = false);

// ---- touch ----
window.addEventListener('contextmenu', e => e.preventDefault());

// ---- go ----
loop();
</script>
</body>
</html>
