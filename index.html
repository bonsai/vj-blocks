<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VJ BLOCKS 🌈</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
canvas{display:block;width:100%;height:100%;image-rendering:pixelated;cursor:none;touch-action:none}
#info{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  font:12px/1 monospace;color:rgba(255,255,255,.3);pointer-events:none;
  text-align:center;letter-spacing:1px}
#mic{position:fixed;top:16px;right:16px;font:12px/1 monospace;
  color:rgba(255,255,255,.4);pointer-events:none;text-align:right;
  transition:color .15s}
#mic.on{color:#0f0;text-shadow:0 0 8px #0f0}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="info">[ 1‥9:mode │ ←→ │ ?:menu │ M:mic │ C │ R │ F │ +/- │ 📱long-press→jog ]</div>
<div id="mic">🎤 <span id="micStatus">OFF</span></div>
<script>
const c = document.getElementById('c'), ctx = c.getContext('2d');
const micEl = document.getElementById('mic');
const micStatus = document.getElementById('micStatus');

let W, H, COLS, ROWS, BLOCK;

// ---- state ----
let grid = [];
let hue = 0, hueSpeed = 0.5;
let mode = 0;
let paused = false;
let mouse = {x: -1, y: -1, down: false};
let frame = 0;
let autoCycle = false;
let cycleTimer = 0;
let showMenu = false; // mode selector overlay

// ---- mode display names ----
const MODE_NAMES = ['🌈Flow','🔲Grid','🌊Wave','🌀Spiral','📺Glitch','🕳Tunnel','🔥Fire','📊Spectrum',
  '🎵Notes','✨Sparkle','🌟Star','💫Dizzy','🌈Rainbow','🔥Fire','🎨Palette',
  '🔮Plasma','🔮Meta','🌊Ripple','🔮Kaleido','✨Stars',
  '👤Body',
  '🌀Voronoi'];
const MODE_COLS = 7; // columns in mode menu grid

// ---- hash routing & mode set ----
function setMode(n) {
  const prev = mode;
  mode = ((n % 22) + 22) % 22;
  location.hash = '#' + mode;
  showToast(MODE_NAMES[mode]);

  // pose auto: on in mode 20, off when leaving
  if (prev !== mode) {
    if (mode === 20 && !poseData.active) initPose();
    else if (prev === 20 && poseData.active) deinitPose();
  }
}

function initHash() {
  const h = parseInt(location.hash.slice(1));
  if (!isNaN(h) && h >= 0 && h < 22) mode = h;
  location.hash = '#' + mode;
}

window.addEventListener('hashchange', () => {
  const h = parseInt(location.hash.slice(1));
  if (!isNaN(h) && h >= 0 && h < 22) mode = h;
});

// ---- mode menu overlay ----
function drawModeMenu() {
  if (!showMenu) return;
  const mw = 500, mh = 360;
  const mx = (W - mw) / 2, my = (H - mh) / 2;

  // backdrop
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(mx - 10, my - 10, mw + 20, mh + 20);

  // title
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('🎮 MODE SELECTOR (click/tap to select)', W/2, my + 24);

  // grid
  const cols = MODE_COLS;
  const rows = Math.ceil(MODE_NAMES.length / cols);
  const cellW = mw / cols, cellH = (mh - 40) / rows;
  const padX = cellW * 0.1, padY = cellH * 0.1;

  for (let i = 0; i < MODE_NAMES.length; i++) {
    const r = Math.floor(i / cols), c = i % cols;
    const cx = mx + c * cellW, cy = my + 36 + r * cellH;
    const active = i === mode;

    ctx.fillStyle = active
      ? `hsla(${(hue + i * 17) % 360},80%,50%,0.6)`
      : `hsla(0,0%,30%,0.5)`;
    ctx.fillRect(cx + padX, cy + padY, cellW - padX * 2, cellH - padY * 2);

    if (active) {
      ctx.strokeStyle = `hsla(${(hue + i * 17) % 360},100%,70%,0.8)`;
      ctx.lineWidth = 2;
      ctx.strokeRect(cx + padX, cy + padY, cellW - padX * 2, cellH - padY * 2);
    }

    ctx.fillStyle = active ? '#fff' : 'rgba(255,255,255,0.6)';
    ctx.font = '11px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(MODE_NAMES[i], cx + cellW/2, cy + cellH/2);
  }
  ctx.textAlign = 'start';
  ctx.textBaseline = 'alphabetic';

  // hint
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('H or ? to close', W/2, my + mh + 4);
  ctx.textAlign = 'start';
}

function hitTestMenu(tx, ty) {
  if (!showMenu) return -1;
  const mw = 500, mh = 360;
  const mx = (W - mw) / 2, my = (H - mh) / 2;
  const cols = MODE_COLS;
  const rows = Math.ceil(MODE_NAMES.length / cols);
  const cellW = mw / cols, cellH = (mh - 40) / rows;
  for (let i = 0; i < MODE_NAMES.length; i++) {
    const r = Math.floor(i / cols), c = i % cols;
    const cx = mx + c * cellW, cy = my + 36 + r * cellH;
    if (tx >= cx && tx <= cx + cellW && ty >= cy && ty <= cy + cellH) return i;
  }
  return -1;
}

// ---- beat flash state ----
let beatFlash = 0; // decays from 1→0
let beatSparks = [];

// ---- emoji mode palette (7 separate modes 8-14) ----

// ---- pose tracking state ----
let poseData = { landmarks: null, active: false, loading: false };
let poseCam = null;
const BODY_PARTS = [
  { start: 0, end: 10, name: 'head', hue: 0 },    // face
  { start: 11, end: 22, name: 'arms', hue: 120 },   // arms
  { start: 23, end: 32, name: 'legs', hue: 240 },   // legs
];

async function initPose() {
  if (poseData.active) { deinitPose(); return; }
  if (poseData.loading) return;
  poseData.loading = true;
  showToast('📷 Loading Pose...');
  try {
    const pose = new Pose({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });
    pose.setOptions({
      modelComplexity: 1,
      smoothLandmarks: true,
      enableSegmentation: false,
      smoothSegmentation: false,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });
    pose.onResults(results => {
      if (results.poseLandmarks) {
        poseData.landmarks = results.poseLandmarks;
        poseData.active = true;
      }
    });
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240, facingMode: 'user' } });
    poseCam = new Camera(document.createElement('video'), {
      onFrame: async () => { await pose.send({ image: poseCam.video }); },
      width: 320, height: 240
    });
    await poseCam.start();
    poseData.loading = false;
    showToast('📷 Pose ON');
  } catch(e) {
    console.warn('Pose init failed:', e);
    poseData.loading = false;
    showToast('📷 Pose FAILED');
  }
}

function deinitPose() {
  if (poseCam) { poseCam.stop(); poseCam = null; }
  poseData.landmarks = null;
  poseData.active = false;
  showToast('📷 Pose OFF');
}

function togglePose() {
  if (poseData.active) deinitPose();
  else initPose();
}

const EMOJI_MODES = [
  { char: '🎵', name: '🎵Notes'  },
  { char: '✨', name: '✨Sparkle'},
  { char: '🌟', name: '🌟Star'   },
  { char: '💫', name: '💫Dizzy'  },
  { char: '🌈', name: '🌈Rainbow'},
  { char: '🔥', name: '🔥Fire'   },
  { char: '🎨', name: '🎨Palette'},
];

// ---- audio state ----
let audioCtx = null;
let analyser = null;
let micStream = null;
let micOn = false;
let freqData = null;
let timeData = null;
let audio = {
  volume: 0,     // RMS (0-1)
  bass: 0,       // 20-250Hz
  mid: 0,        // 250-2kHz
  treble: 0,     // 2-20kHz
  spectrum: [],  // smoothed spectrum for visualizer
  peak: [],      // peak hold values
  wave: [],      // smoothed waveform
  beat: false,
  beatEnergy: 0
};
let beatHistory = [];
const FFT_SIZE = 512; // higher res for visualizer
let audioViz = { bars: [], peaks: [] };

// ---- resize ----
function resize() {
  W = c.width = window.innerWidth;
  H = c.height = window.innerHeight;
  BLOCK = Math.max(8, Math.min(32, Math.round(Math.min(W,H) / 48)));
  COLS = Math.ceil(W / BLOCK);
  ROWS = Math.ceil(H / BLOCK);
  grid = Array.from({length: ROWS}, () => Array(COLS).fill(0));
}
resize();
window.addEventListener('resize', resize);

// ---- audio engine ----
async function initMic() {
  try {
    micStream = await navigator.mediaDevices.getUserMedia({audio: true});
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = FFT_SIZE;
    const src = audioCtx.createMediaStreamSource(micStream);
    src.connect(analyser);
    freqData = new Uint8Array(analyser.frequencyBinCount);
    timeData = new Uint8Array(analyser.frequencyBinCount);
    audio.spectrum = new Float32Array(analyser.frequencyBinCount);
    audio.peak = new Float32Array(analyser.frequencyBinCount);
    audio.wave = new Float32Array(timeData.length);
    micOn = true;
    micEl.classList.add('on');
    micStatus.textContent = 'ON';
    return true;
  } catch(e) {
    console.warn('Mic access denied:', e);
    micOn = false;
    micEl.classList.remove('on');
    micStatus.textContent = 'DENIED';
    return false;
  }
}

function closeMic() {
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  analyser = null;
  micOn = false;
  micEl.classList.remove('on');
  micStatus.textContent = 'OFF';
}

function toggleMic() {
  if (micOn) { closeMic(); }
  else { initMic(); }
}

function analyzeAudio() {
  if (!analyser || !micOn) return;

  // time-domain (RMS volume)
  analyser.getByteTimeDomainData(timeData);
  let sumSq = 0;
  for (let i = 0; i < timeData.length; i++) {
    const norm = (timeData[i] - 128) / 128;
    sumSq += norm * norm;
  }
  audio.volume = Math.min(1, Math.sqrt(sumSq / timeData.length) * 2);

  // frequency-domain
  analyser.getByteFrequencyData(freqData);
  const nyquist = audioCtx ? audioCtx.sampleRate / 2 : 24000;
  const binHz = nyquist / freqData.length;

  // smooth spectrum (exponential moving average) + peak hold
  const smooth = 0.3;
  const peakDecay = 0.92;
  for (let i = 0; i < freqData.length; i++) {
    const raw = freqData[i] / 255;
    audio.spectrum[i] = audio.spectrum[i] * (1 - smooth) + raw * smooth;
    audio.peak[i] = Math.max(audio.spectrum[i], audio.peak[i] * peakDecay);
  }

  // smooth waveform
  analyser.getByteTimeDomainData(timeData);
  const waveSmooth = 0.4;
  for (let i = 0; i < timeData.length; i++) {
    const raw = (timeData[i] - 128) / 128;
    audio.wave[i] = audio.wave[i] * (1 - waveSmooth) + raw * waveSmooth;
  }

  // bass: bins 0-5 (~0-250Hz), mid: 6-40 (~250-2kHz), treble: 41+ (~2kHz+)
  let bassSum = 0, midSum = 0, trebleSum = 0;
  const bassEnd = Math.min(6, freqData.length);
  const midEnd = Math.min(41, freqData.length);
  for (let i = 0; i < freqData.length; i++) {
    const v = freqData[i] / 255;
    if (i < bassEnd) bassSum += v;
    else if (i < midEnd) midSum += v;
    else trebleSum += v;
  }
  const bassN = bassEnd;
  const midN = midEnd - bassEnd;
  const trebleN = freqData.length - midEnd;
  audio.bass = bassN > 0 ? bassSum / bassN : 0;
  audio.mid = midN > 0 ? midSum / midN : 0;
  audio.treble = trebleN > 0 ? trebleSum / trebleN : 0;

  // simple beat detection on bass
  const prevBeat = audio.beat;
  beatHistory.push(audio.bass);
  if (beatHistory.length > 43) beatHistory.shift();
  const avg = beatHistory.reduce((a,b) => a+b, 0) / beatHistory.length;
  audio.beat = audio.bass > avg * 1.35 && audio.bass > 0.15;
  audio.beatEnergy = audio.beat ? audio.bass : 0;

  // beat flash & sparks
  if (audio.beat && !prevBeat) {
    beatFlash = 1;
    for (let i = 0; i < 8; i++) {
      beatSparks.push({
        x: Math.random(),
        y: Math.random(),
        vx: (Math.random() - 0.5) * 0.02,
        vy: -Math.random() * 0.02 - 0.005,
        life: 1,
        decay: 0.015 + Math.random() * 0.02,
        hue: (hue + Math.random() * 120) % 360,
        size: 2 + Math.random() * 4
      });
    }
  }
}

// ---- block renderers per mode ----
function updateGrid() {
  const t = frame * 0.02;
  const mX = mouse.down ? mouse.x / W : 0.5;
  const mY = mouse.down ? mouse.y / H : 0.5;

  // audio modulation
  const vol = audio.volume;
  const bass = audio.bass;
  const mid = audio.mid;
  const treb = audio.treble;
  const beat = audio.beat ? 1 : 0;

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const nx = c / COLS, ny = r / ROWS;
      let val = 0;

      switch (mode) {
        case 0: // rainbow flow — waves with audio
          val = (nx * (1 + bass * 0.5) + ny + t * (0.3 + mid * 0.3) + vol * 0.15) % 1;
          break;
        case 1: // static rainbow grid — pulsing with beat
          const beatPulse = beat ? 0.15 * Math.sin(t * 12) : 0;
          val = ((nx * (3 + treb * 2) + ny * 2 + beatPulse) % 1 + t * (0.05 + bass * 0.08)) % 1;
          break;
        case 2: { // wave — center follows volume
          const r2 = Math.sqrt((nx - 0.5)**2 + (ny - (0.5 + vol * 0.2))**2) * (6 + bass * 4);
          val = (Math.sin(r2 - t * (2 + vol * 3)) + 1) * 0.5;
          break; }
        case 3: { // spiral — arms spin with mid
          const dx = nx - mX, dy = ny - mY;
          const a = Math.atan2(dy, dx) / (Math.PI * 2);
          const d = Math.sqrt(dx*dx + dy*dy) * (5 + treb * 4);
          val = ((a + d - t * (0.5 + mid * 1.0)) % 1 + 1) % 1;
          break; }
        case 4: { // noise / glitch — triggered by beat
          const seed = (nx * 7.31 + ny * 13.17 + t * (1.7 + vol * 2.5));
          let n = Math.sin(seed) * 0.5 + Math.sin(seed * 1.7) * 0.25 + Math.sin(seed * 4.3) * 0.125;
          if (beat) {
            // jitter on beat
            const jx = Math.sin(seed * 17.3 + t * 30) * 0.2;
            const jy = Math.cos(seed * 23.7 + t * 30) * 0.2;
            val = ((nx + jx + ny + jy) * 0.5 + n * 0.5 + t * 0.05) % 1;
          } else {
            val = ((n * 0.5 + 0.5) + t * 0.02) % 1;
          }
          break; }
        case 5: { // tunnel — bass drives zoom
          const dx = nx - 0.5, dy = ny - 0.5;
          const d = Math.sqrt(dx*dx + dy*dy);
          const a = Math.atan2(dy, dx);
          const zoom = 0.5 + bass * 0.5;
          val = ((a / (Math.PI * 2) + t * (0.3 + mid * 0.3) - d * (2 + zoom * 3)) % 1 + 1) % 1;
          break; }
        case 6: { // fire — treble sparks
          const seed = nx * 37 + ny * 71 + t * 5 + treb * 10;
          const n = Math.sin(seed) * 0.5 + Math.sin(seed * 3.1) * 0.3 + Math.sin(seed * 7.7) * 0.2;
          val = ((n * 0.5 + 0.5) * (0.5 + vol * 0.5) + t * 0.01) % 1;
          break; }
        case 8: case 9: case 10: case 11: case 12: case 13: case 14: { // emoji modes
          const pulse = 0.6 + 0.4 * Math.sin(t * 0.5 + r * 0.3 + c * 0.2);
          val = ((nx + ny + t * 0.05) * 0.3 + pulse * 0.2 + 0.3) % 1;
          break; }
        case 15: { // plasma — demoscene classic
          const px = nx * 8, py = ny * 6;
          const p = Math.sin(px * 1.1 + t * 0.8) + Math.sin(py * 0.9 + t * 0.6)
                  + Math.sin((px + py) * 0.7 + t * 0.5) + Math.sin(Math.sin(px * 1.3 + py * 0.8 + t * 1.1));
          val = ((p + 4) / 8 * 0.8 + 0.1) % 1;
          break; }
        case 16: { // metaballs — organic blobs
          const nBlobs = 6;
          let sum = 0;
          for (let i = 0; i < nBlobs; i++) {
            const cx = 0.5 + 0.35 * Math.sin(i * 2.1 + t * 0.3 + i * 0.7);
            const cy = 0.5 + 0.35 * Math.cos(i * 1.7 + t * 0.25 + i * 0.9);
            const dz = (nx - cx) ** 2 + (ny - cy) ** 2;
            const r = 0.03 + 0.025 * Math.sin(i * 0.5 + t * 0.15);
            sum += r / (dz + 0.002);
          }
          val = Math.min(1, sum * 2) % 1;
          break; }
        case 17: { // ripple — interfering wave rings
          const gridSize = 3;
          let sum = 0;
          for (let gy = 0; gy < gridSize; gy++) {
            for (let gx = 0; gx < gridSize; gx++) {
              const sx = (gx + 0.5) / gridSize;
              const sy = (gy + 0.5) / gridSize;
              const dx = nx - sx, dy = ny - sy;
              const d = Math.sqrt(dx * dx + dy * dy);
              const phase = gy * 1.3 + gx * 0.7;
              sum += Math.sin(d * 12 - t * 2 + phase) / (d + 0.3);
            }
          }
          val = ((sum / gridSize + 1) * 0.4 + 0.1) % 1;
          break; }
        case 18: { // kaleidoscope — 8-fold symmetry
          const cx = nx - 0.5, cy = ny - 0.5;
          const a = Math.atan2(cy, cx);
          const fold = Math.abs(a % (Math.PI / 4) - Math.PI / 8);
          const d = Math.sqrt(cx * cx + cy * cy) * 6;
          val = ((Math.sin(d * 1.5 + t * 0.8) + Math.sin(fold * 12 + t * 0.5)) * 0.3 + 0.5) % 1;
          break; }
        case 19: { // starfield — warp tunnel
          const cx = nx - 0.5, cy = ny - 0.5;
          const d = Math.sqrt(cx * cx + cy * cy);
          const a = Math.atan2(cy, cx);
          const warp = d * 4 + t * 1.5;
          const speedLayer = Math.sin(d * 6 - t * 3 + a * 2);
          val = ((Math.sin(warp + a * 3) * (1 - d) + speedLayer * 0.3 + 1) * 0.35) % 1;
          break; }
        case 20: { // body — camera pose-reactive blocks
          let bump = 0, partHue = 0;
          if (poseData.landmarks && poseData.landmarks.length > 0) {
            let minDist = Infinity, minIdx = 0;
            for (let i = 0; i < poseData.landmarks.length; i++) {
              const l = poseData.landmarks[i];
              if (l.visibility < 0.3) continue;
              const dx = nx - l.x, dy = ny - (1 - l.y);
              const d = dx * dx + dy * dy;
              if (d < minDist) { minDist = d; minIdx = i; }
            }
            bump = Math.exp(-minDist * 180);
            partHue = minIdx * 11;
          }
          val = ((partHue / 360 + bump * 0.5 + t * 0.02) % 1 + 1) % 1;
          break; }
        case 21: { // voronoi — psychedelic rainbow cells
          const nSeeds = 10;
          let minDist = Infinity, minIdx = 0;
          for (let i = 0; i < nSeeds; i++) {
            const sx = 0.5 + 0.38 * Math.sin(i * 2.094 + t * 0.22 + i * 0.7);
            const sy = 0.5 + 0.38 * Math.cos(i * 1.675 + t * 0.19 + i * 0.9);
            const dx = nx - sx, dy = ny - sy;
            const d = dx * dx + dy * dy;
            if (d < minDist) { minDist = d; minIdx = i; }
          }
          const cellHue = (minIdx * 36 + t * 40 + hue) % 360;
          const boundary = Math.exp(-minDist * 160);
          val = ((cellHue / 360) + boundary * 0.25 + t * 0.01) % 1;
          break; }
        case 7: { // spectrum analyzer — mic visual feedback
          const specIdx = Math.floor(c / COLS * freqData.length);
          const idx = Math.min(specIdx, freqData.length - 1);
          const amp = audio.spectrum[idx] || 0;
          const peak = audio.peak[idx] || 0;
          const barH = amp * 0.85;
          const peakH = peak * 0.85;
          // bar fill
          if (ny < barH) {
            // rainbow by position, brighter at top
            const bright = 55 + 30 * (1 - ny / barH);
            val = ((ny * 0.3 + c * 0.1 + t * 0.05) * 360 + hue + idx * 2) / 360;
          } else if (ny >= peakH - 0.03 && ny <= peakH) {
            // peak hold dot
            val = ((hue + idx * 3 + 180) % 360) / 360;
          } else {
            val = 0;
          }
          // waveform at very bottom (last 2 rows)
          if (ny > 0.85 && audio.wave.length > 0) {
            const wIdx = Math.floor(c / COLS * audio.wave.length);
            const wv = audio.wave[Math.min(wIdx, audio.wave.length - 1)] || 0;
            const wy = 0.85 + (wv + 1) * 0.075;
            val = Math.abs(ny - wy) < 0.02 ? ((hue + c * 2 + t * 20) % 360) / 360 : val;
          }
          break; }
      }

      // beat: grid shift per mode
      if (beat && mode < 5) {
        const shiftX = Math.sin(t * 30) * 0.1;
        const shiftY = Math.cos(t * 30) * 0.1;
        val = ((val + shiftX + shiftY) % 1 + 1) % 1;
      }

      grid[r][c] = val;
    }
  }
}

function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  const t = frame * 0.01;
  const vol = audio.volume;
  const bass = audio.bass;
  const beat = audio.beat ? 1 : 0;

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      // hue advances faster with bass
      const h = (grid[r][c] * 360 + hue + bass * 30) % 360;
      const s = 100;

      // brightness: base + volume modulation + beat
      let l = 50 + 15 * Math.sin(grid[r][c] * Math.PI * 2 + t);
      l += vol * 10;
      l = Math.min(92, l);

      // beat: extra glow
      if (beat) l = Math.min(98, l + 20);

      // ---- emoji modes (8-14) ----
      const isEmoji = mode >= 8 && mode <= 14;
      if (isEmoji) {
        const ei = mode - 8;
        const { char: emoji } = EMOJI_MODES[ei];
        // softer background
        ctx.fillStyle = `hsl(${h|0},${s}%,${(l * 0.3 + 15)|0}%)`;
        const bx = c * BLOCK, by = r * BLOCK;
        ctx.fillRect(bx, by, BLOCK, BLOCK);

        // motion per emoji mode
        const phase = c * 0.7 + r * 0.5 + t * 0.8;
        let bobX = 0, bobY = 0, sz = BLOCK * 0.55;
        switch(ei) {
          case 0: // 🎵 notes — vertical bounce
            bobY = Math.sin(phase * 1.3) * BLOCK * 0.18;
            sz = BLOCK * (0.5 + 0.15 * Math.sin(phase * 0.7));
            break;
          case 1: // ✨ sparkle — twinkle scale
            sz = BLOCK * (0.3 + 0.35 * Math.sin(phase * 1.1 + Math.sin(t * 0.3)));
            break;
          case 2: // 🌟 star — orbital drift
            bobX = Math.sin(phase * 0.9) * BLOCK * 0.2;
            bobY = Math.cos(phase * 0.9) * BLOCK * 0.15;
            break;
          case 3: // 💫 dizzy — spiral jitter
            bobX = Math.sin(phase * 2.1 + t * 0.5) * BLOCK * 0.12;
            bobY = Math.cos(phase * 2.1 + t * 0.5) * BLOCK * 0.12;
            sz = BLOCK * (0.45 + 0.15 * Math.sin(phase * 2.5));
            break;
          case 4: // 🌈 rainbow — horizontal wave sweep
            bobX = Math.sin(phase * 0.5 + t * 0.2) * BLOCK * 0.25;
            sz = BLOCK * (0.5 + 0.1 * Math.sin(phase * 0.6));
            break;
          case 5: // 🔥 fire — upward drift + flicker
            bobY = -Math.abs(Math.sin(phase * 0.7 + t * 0.4)) * BLOCK * 0.2;
            sz = BLOCK * (0.4 + 0.25 * Math.sin(phase * 1.7 + t * 0.5));
            break;
          case 6: // 🎨 palette — random jitter
            bobX = Math.sin(Math.sin(phase * 3.1) * 7 + t) * BLOCK * 0.08;
            bobY = Math.cos(phase * 4.3 + t * 0.3) * BLOCK * 0.08;
            break;
        }

        ctx.font = `${Math.max(8, sz|0)}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(emoji, bx + BLOCK/2 + bobX|0, by + BLOCK/2 + bobY|0);
        continue;
      }

      // ---- body mode (20) — 3D bump from pose ----
      if (mode === 20 && poseData.landmarks) {
        // find nearest landmark for bump height
        const nx2 = c / COLS, ny2 = r / ROWS;
        let minDist = Infinity, minIdx = 0;
        for (let i = 0; i < poseData.landmarks.length; i++) {
          const l = poseData.landmarks[i];
          if (l.visibility < 0.3) continue;
          const dx = nx2 - l.x, dy = ny2 - (1 - l.y);
          const d = dx * dx + dy * dy;
          if (d < minDist) { minDist = d; minIdx = i; }
        }
        const bump = Math.exp(-minDist * 180);
        const bHue = (minIdx * 11 + hue) % 360;

        // bump scale for 3D protrusion
        const bw = BLOCK * (1 + bump * 0.5);
        const bh = BLOCK * (1 + bump * 0.5);
        const bx = c * BLOCK + (BLOCK - bw) / 2;
        const by = r * BLOCK + (BLOCK - bh) / 2;

        // base + bump brightness
        const bL = 35 + bump * 50;
        ctx.fillStyle = `hsl(${bHue|0},90%,${bL|0}%)`;
        ctx.fillRect(bx|0, by|0, bw|0, bh|0);

        // exaggerated 3D: bright top-left, dark bottom-right
        const highlight = Math.min(95, bL + 25 * bump);
        ctx.fillStyle = `hsla(${bHue|0},90%,${highlight|0}%,${0.4 + 0.4 * bump})`;
        ctx.fillRect(bx|0, by|0, bw|0, 3);
        ctx.fillRect(bx|0, by|0, 3, bh|0);

        const shadow = Math.max(5, bL - 30 * bump);
        ctx.fillStyle = `hsla(${bHue|0},90%,${shadow|0}%,${0.5 + 0.4 * bump})`;
        ctx.fillRect(bx|0, (by+bh-3)|0, bw|0, 3);
        ctx.fillRect((bx+bw-3)|0, by|0, 3, bh|0);

        // glow for near-landmark blocks
        if (bump > 0.3) {
          ctx.shadowColor = `hsl(${bHue|0},100%,60%)`;
          ctx.shadowBlur = BLOCK * bump * 0.5;
          ctx.fillStyle = `hsla(${bHue|0},100%,${60 + 30 * bump|0}%,${bump * 0.15})`;
          ctx.fillRect(bx|0, by|0, bw|0, bh|0);
          ctx.shadowBlur = 0;
        }
        continue;
      }

      ctx.fillStyle = `hsl(${h|0},${s}%,${l|0}%)`;

      // block size pulses with volume
      const pulse = 1 + vol * 0.15 + (beat ? 0.2 : 0);
      const bw = BLOCK * pulse;
      const bh = BLOCK * pulse;
      const bx = c * BLOCK + (BLOCK - bw) / 2;
      const by = r * BLOCK + (BLOCK - bh) / 2;
      ctx.fillRect(bx|0, by|0, bw|0, bh|0);

      // highlight edge
      ctx.fillStyle = `hsla(${h|0},${s}%,${Math.min(l+15,95)|0}%,0.3)`;
      ctx.fillRect(bx|0, by|0, bw|0, 2);
      ctx.fillRect(bx|0, by|0, 2, bh|0);

      // shadow edge
      ctx.fillStyle = `hsla(${h|0},${s}%,${Math.max(l-25,5)|0}%,0.4)`;
      ctx.fillRect(bx|0, (by+bh-2)|0, bw|0, 2);
      ctx.fillRect((bx+bw-2)|0, by|0, 2, bh|0);
    }
  }

  // beat flash border
  const flash = beat ? 0.6 : 0.15 + 0.1 * Math.sin(t * 2);
  ctx.strokeStyle = `hsla(${(hue + t * 60 + bass * 90) % 360},100%,60%,${flash})`;
  ctx.lineWidth = beat ? 6 : 4;
  ctx.strokeRect(2, 2, W - 4, H - 4);

  // beat flash overlay
  if (beatFlash > 0.01) {
    ctx.fillStyle = `hsla(0,0%,100%,${beatFlash * 0.12})`;
    ctx.fillRect(0, 0, W, H);
    beatFlash *= 0.88;
  }

  // beat sparks (particles)
  for (let i = beatSparks.length - 1; i >= 0; i--) {
    const s = beatSparks[i];
    s.x += s.vx;
    s.y += s.vy;
    s.life -= s.decay;
    if (s.life <= 0) { beatSparks.splice(i, 1); continue; }
    ctx.fillStyle = `hsla(${s.hue|0},100%,70%,${s.life * 0.6})`;
    const sx = s.x * W, sy = s.y * H;
    const sz = s.size * s.life;
    ctx.fillRect(sx|0, sy|0, sz|0, sz|0);
  }

  // auto-cycle mode indicator
  if (autoCycle) {
    ctx.fillStyle = `hsla(${(hue + 180) % 360},100%,60%,${0.15 + 0.1 * Math.sin(t * 3)})`;
    ctx.font = '10px monospace';
    ctx.fillText('AUTO', 16, 30);
  }

  // toast notification (touch feedback)
  if (toastTimer > 0) {
    toastTimer--;
    const alpha = toastTimer > 25 ? (30 - toastTimer) / 5 : toastTimer / 30;
    ctx.fillStyle = `rgba(0,0,0,${0.5 * alpha})`;
    const tw = ctx.measureText(toastText).width;
    ctx.fillRect(W/2 - tw/2 - 12, H/2 - 18, tw + 24, 36);
    ctx.fillStyle = `rgba(255,255,255,${0.9 * alpha})`;
    ctx.font = 'bold 18px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(toastText, W/2, H/2 + 6);
    ctx.textAlign = 'start';
  }

  // jog dial (long-press radial menu)
  if (jogDial.active) {
    jogDial.timeout--;
    if (jogDial.timeout <= 0) jogDial.active = false;
    drawJogDial();
  }

  // mode badge (top-left)
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(8, 8, 140, 26);
  ctx.fillStyle = `hsla(${(hue + mode * 17) % 360},80%,70%,0.9)`;
  ctx.font = 'bold 13px monospace';
  ctx.fillText(`#${mode} ${MODE_NAMES[mode]}`, 14, 26);

  // menu overlay (on top of everything)
  drawModeMenu();

  // spectrum visualizer overlay (subtle, bottom edge)
  if (micOn && freqData) {
    const barW = 3;
    const barGap = 1;
    const barH = 40;
    const barY = H - barH - 8;
    const nBars = Math.min(64, freqData.length);
    const totalW = nBars * (barW + barGap);
    const startX = (W - totalW) / 2;

    for (let i = 0; i < nBars; i++) {
      // average multiple bins per bar for visual smoothness
      let sum = 0;
      const binsPerBar = Math.max(1, Math.floor(freqData.length / nBars));
      for (let j = 0; j < binsPerBar; j++) {
        sum += freqData[i * binsPerBar + j] || 0;
      }
      const v = sum / (binsPerBar * 255);
      const barHeight = Math.max(1, v * barH);

      // rainbow by position
      const barHue = (hue + i * 5.6) % 360;
      ctx.fillStyle = `hsla(${barHue|0},100%,${50 + v * 40|0}%,0.35)`;
      ctx.fillRect(startX + i * (barW + barGap), barY + barH - barHeight, barW, barHeight);
    }

    // activity dB meter (top-right corner)
    const db = 20 * Math.log10(Math.max(0.001, audio.volume));
    const dbNorm = Math.min(1, (db + 40) / 40); // -40dB to 0dB scaled
    const meterW = 4;
    const meterH = 60;
    const meterX = W - 24;
    const meterY = 40;
    ctx.fillStyle = `hsla(${(1 - dbNorm) * 120},100%,50%,0.3)`;
    ctx.fillRect(meterX, meterY + meterH * (1 - dbNorm), meterW, meterH * dbNorm);
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.strokeRect(meterX, meterY, meterW, meterH);
  }
}

// ---- loop ----
function loop() {
  if (!paused) {
    analyzeAudio();
    updateAutoCycle();
    hue = (hue + hueSpeed + audio.mid * 0.5) % 360;
    updateGrid();
    draw();
    frame++;
  }
  requestAnimationFrame(loop);
}

// ---- auto-cycle ----
function updateAutoCycle() {
  if (!autoCycle || !micOn) return;
  cycleTimer++;
  // switch mode every ~4 seconds at 60fps
  if (cycleTimer > 60 * 4) {
    setMode(mode + 1);
    cycleTimer = 0;
  }
}

// ---- interact ----
document.addEventListener('keydown', e => {
  const k = e.key;
  if (k >= '1' && k <= '9') { setMode(parseInt(k) - 1); return; }
  switch(k) {
    case ' ': e.preventDefault(); paused = !paused; return;
    case 'ArrowLeft': setMode(mode - 1); return;
    case 'ArrowRight': setMode(mode + 1); return;
    case 'r': case 'R': hue = 0; frame = 0; audio.beat = false; return;
    case 'f': case 'F': c.requestFullscreen(); return;
    case 'm': case 'M': toggleMic(); return;
    case 'c': case 'C': autoCycle = !autoCycle; cycleTimer = 0; return;
    case '+': case '=': hueSpeed = Math.min(3, hueSpeed + 0.1); return;
    case '-': case '_': hueSpeed = Math.max(0, hueSpeed - 0.1); return;
    case '?': case 'h': case 'H': showMenu = !showMenu; return;
  }
});

c.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
c.addEventListener('mousedown', () => mouse.down = true);
c.addEventListener('mouseup', () => mouse.down = false);
c.addEventListener('click', e => {
  if (showMenu) {
    const mi = hitTestMenu(e.clientX, e.clientY);
    if (mi >= 0) { setMode(mi); showMenu = false; return; }
  }
});
// ---- jog dial (long-press radial menu) ----
let jogDial = {
  active: false,
  x: 0, y: 0,
  timeout: 0,      // auto-dismiss countdown (frames)
  buttons: [
    { label: '◀', action: 'prev',  angle: 180 },
    { label: '▶', action: 'next',  angle: 0 },
    { label: '🎤', action: 'mic',   angle: 315 },
    { label: '⏸', action: 'pause', angle: 270 },
    { label: '🔄', action: 'auto',  angle: 225 },
    { label: '⏺', action: 'reset', angle: 135 },
    { label: '+',  action: 'spdup', angle: 90 },
    { label: '−',  action: 'spddn', angle: 45 },
  ],
  dialR: 110,
  btnR: 22,
};

function execJog(action) {
  switch(action) {
    case 'prev': setMode(mode - 1); break;
    case 'next': setMode(mode + 1); break;
    case 'mic': toggleMic(); showToast(micOn ? '🎤 MIC ON' : '🎤 MIC OFF'); break;
    case 'pause': paused = !paused; showToast(paused ? '⏸ PAUSED' : '▶ PLAY'); break;
    case 'auto': autoCycle = !autoCycle; cycleTimer = 0; showToast(autoCycle ? '🔄 AUTO ON' : '🔄 AUTO OFF'); break;
    case 'reset': hue = 0; frame = 0; audio.beat = false; showToast('⏺ RESET'); break;
    case 'spdup': hueSpeed = Math.min(3, hueSpeed + 0.1); showToast('+ ' + hueSpeed.toFixed(1)); break;
    case 'spddn': hueSpeed = Math.max(0, hueSpeed - 0.1); showToast('− ' + hueSpeed.toFixed(1)); break;
  }
}

function drawJogDial() {
  if (!jogDial.active) return;
  const { x, y, dialR, btnR, buttons } = jogDial;
  const a = jogDial.timeout > 0 ? Math.min(1, jogDial.timeout / 20) : 1;

  // dim background circle
  ctx.fillStyle = `rgba(0,0,0,${0.55 * a})`;
  ctx.beginPath();
  ctx.arc(x, y, dialR + btnR + 8, 0, Math.PI * 2);
  ctx.fill();

  // outer ring
  ctx.strokeStyle = `hsla(${(hue + 180) % 360},80%,60%,${0.4 * a})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x, y, dialR, 0, Math.PI * 2);
  ctx.stroke();

  // center label
  ctx.fillStyle = `rgba(255,255,255,${0.7 * a})`;
  ctx.font = 'bold 13px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(MODE_NAMES[mode], x, y - 6);
  ctx.fillStyle = `rgba(255,255,255,${0.4 * a})`;
  ctx.font = '10px monospace';
  ctx.fillText('mode', x, y + 12);
  ctx.textAlign = 'start';
  ctx.textBaseline = 'alphabetic';

  // jog buttons
  for (const btn of buttons) {
    const rad = (btn.angle - 90) * Math.PI / 180;
    const bx = x + Math.cos(rad) * dialR;
    const by = y + Math.sin(rad) * dialR;
    // button circle
    ctx.fillStyle = `hsla(${(hue + btn.angle * 2) % 360},70%,40%,${0.7 * a})`;
    ctx.beginPath();
    ctx.arc(bx, by, btnR, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = `hsla(0,0%,100%,${0.3 * a})`;
    ctx.lineWidth = 1;
    ctx.stroke();
    // label
    ctx.fillStyle = `rgba(255,255,255,${0.95 * a})`;
    ctx.font = `${btn.label.length > 1 ? 12 : 16}px monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(btn.label, bx, by);
  }
  ctx.textAlign = 'start';
  ctx.textBaseline = 'alphabetic';
}

function hitTestJogDial(tx, ty) {
  if (!jogDial.active) return null;
  const { x, y, dialR, btnR, buttons } = jogDial;
  // check buttons first
  for (const btn of buttons) {
    const rad = (btn.angle - 90) * Math.PI / 180;
    const bx = x + Math.cos(rad) * dialR;
    const by = y + Math.sin(rad) * dialR;
    const dx = tx - bx, dy = ty - by;
    if (dx * dx + dy * dy <= btnR * btnR) return btn.action;
  }
  // check if inside dial area (dismiss if outside)
  const dx = tx - x, dy = ty - y;
  if (dx * dx + dy * dy > (dialR + btnR + 20) * (dialR + btnR + 20)) return 'dismiss';
  return null; // inside dial but not on a button = ignore
}

// ---- touch controls ----
let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
let touchMoved = false;
let longPressId = null;

c.addEventListener('touchstart', e => {
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
  touchStartTime = Date.now();
  touchMoved = false;
  mouse.x = t.clientX; mouse.y = t.clientY; mouse.down = true;

  // if jog dial is active, check button hit on touchstart
  if (jogDial.active) {
    const action = hitTestJogDial(t.clientX, t.clientY);
    if (action === 'dismiss') { jogDial.active = false; return; }
    if (action) { execJog(action); jogDial.active = false; return; }
    // touched inside dial but not a button → reset timeout
    jogDial.timeout = 120;
    return; // suppress other gestures while dial active
  }

  // if menu is active, check grid hit
  if (showMenu) {
    const mi = hitTestMenu(t.clientX, t.clientY);
    if (mi >= 0) { setMode(mi); showMenu = false; return; }
    return; // block other gestures while menu open
  }

  // long press timer (500ms)
  if (longPressId) clearTimeout(longPressId);
  longPressId = setTimeout(() => {
    if (!touchMoved) {
      jogDial.active = true;
      jogDial.x = touchStartX;
      jogDial.y = touchStartY;
      jogDial.timeout = 120; // ~2s auto-dismiss
    }
  }, 500);
});

c.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  if (Math.abs(dx) > 20 || Math.abs(dy) > 20) touchMoved = true;
  mouse.x = t.clientX; mouse.y = t.clientY;
  // cancel long press if moved
  if (touchMoved && longPressId) { clearTimeout(longPressId); longPressId = null; }
}, { passive: false });

c.addEventListener('touchend', e => {
  mouse.down = false;
  if (longPressId) { clearTimeout(longPressId); longPressId = null; }

  // jog dial active? handled in touchstart
  if (jogDial.active) return;

  // swipe gesture
  if (touchMoved) {
    const dx = (mouse.x || touchStartX) - touchStartX;
    if (Math.abs(dx) > 50) {
      if (dx < 0) setMode(mode + 1);
      else setMode(mode - 1);
    }
    return;
  }
  // quick tap: toggle pause
  paused = !paused;
  showToast(paused ? '⏸ PAUSED' : '▶ PLAY');
});

// ---- toast notification for touch feedback ----
let toastText = '', toastTimer = 0;
function showToast(msg) {
  toastText = msg;
  toastTimer = 30; // ~0.5s
}
window.addEventListener('contextmenu', e => e.preventDefault());

// ---- go ----
initHash();
loop();
</script>
</body>
