<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VJ BLOCKS 🎮</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0a0a12;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:monospace;color:#fff}
h1{font-size:28px;margin-bottom:8px;letter-spacing:2px}
p{color:rgba(255,255,255,.4);margin-bottom:32px;font-size:13px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:440px;width:90%}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
  border-radius:12px;padding:24px 20px;text-align:center;text-decoration:none;color:#fff;
  transition:all .2s;cursor:pointer}
.card:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.25);transform:translateY(-2px)}
.card .icon{font-size:36px;margin-bottom:8px}
.card .name{font-size:15px;font-weight:700;margin-bottom:4px}
.card .desc{font-size:11px;color:rgba(255,255,255,.4)}
</style>
</head>
<body>
<h1>🎮 VJ BLOCKS</h1>
<p>select mode category</p>
<div class="grid">
  <a class="card" href="auto/">
    <div class="icon">🌈🔮🌀</div>
    <div class="name">Auto</div>
    <div class="desc">14 generative modes · Flow · Plasma · Voronoi</div>
  </a>
  <a class="card" href="camera/">
    <div class="icon">📷👤</div>
    <div class="name">Camera</div>
    <div class="desc">Body pose · Live pixel blocks</div>
  </a>
  <a class="card" href="emoji/">
    <div class="icon">🙂✨🎵</div>
    <div class="name">Emoji</div>
    <div class="desc">7 kaomoji modes · Notes · Stars · Fire</div>
  </a>
  <a class="card" href="fire/">
    <div class="icon">🔥</div>
    <div class="name">Fire</div>
    <div class="desc">Treble sparks · Mic reactive · Pure flame</div>
  </a>
</div>
</body>
</html>
