name: Test JS Syntax
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate all HTML/JS files
        id: test
        run: |
          FAILED=0
          for f in auto/index.html camera/index.html emoji/index.html fire/index.html; do
            if [ ! -f "$f" ]; then
              echo "âťŚ MISSING: $f"
              FAILED=1
              continue
            fi
            JS=$(node -e "
              const fs=require('fs');
              const html=fs.readFileSync('$f','utf-8');
              const m=html.match(/<script>([\s\S]*?)<\\/script>/);
              console.log(m ? m[1] : '');
            ")
            if [ -z "$JS" ]; then
              echo "âš ď¸Ź  NO SCRIPT: $f"
              continue
            fi
            if node -e "try{new Function(\`$JS\`);console.log('OK')}catch(e){console.log('FAIL:'+e.message);process.exit(1)}"; then
              echo "âś… $f"
            else
              echo "âťŚ SYNTAX ERROR: $f"
              FAILED=1
            fi
          done
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          exit $FAILED

      - name: Create issue on failure
        if: failure() && github.ref == 'refs/heads/master'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pages = ['auto/index.html','camera/index.html','emoji/index.html','fire/index.html'];
            let details = '';
            for (const p of pages) {
              try {
                const html = fs.readFileSync(p, 'utf-8');
                const m = html.match(/<script>([\s\S]*?)<\\/script>/);
                if (m) new Function(m[1]);
                details += `âś… ${p}\n`;
              } catch(e) {
                details += `âťŚ ${p}: ${e.message}\n`;
              }
            }
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'đź§Ş Test failed â€” JS syntax error',
              body: `## âťŚ Test Failed\n\nRun: ${runUrl}\n\n\`\`\`\n${details}\`\`\`\n\nAuto-created by test workflow.`
            });
