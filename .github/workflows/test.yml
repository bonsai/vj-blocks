name: Test JS Syntax
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate all HTML/JS files
        id: test
        run: node .github/scripts/validate.js

      - name: Create issue on failure
        if: failure() && github.ref == 'refs/heads/master'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const out = execSync('node .github/scripts/validate.js 2>&1', {encoding:'utf8'});
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🧪 Test failed — JS syntax error',
              body: `## ❌ Test Failed\n\nRun: ${runUrl}\n\n\`\`\`\n${out}\`\`\`\n\nAuto-created by test workflow.`
            });
